## Ecclesiastic Wallpapers — Configuration

# Where original paintings are stored (permanent, grows over time)
POOL_DIR="$HOME/Pictures/ArtWallpapers"

# Where composed wallpapers are cached (blurred bg + centered painting)
COMPOSE_DIR="$HOME/Pictures/ArtWallpapers/composed"

# Metadata directory
META_DIR="$HOME/Pictures/ArtWallpapers/meta"

# SQLite database for ratings and history
DB_PATH="$HOME/.local/share/ecclesiastic/ratings.db"

# How many paintings to prefetch on boot
PREFETCH_BATCH=16

# Minimum image dimension (skip tiny paintings)
MIN_SIZE=800

# Art styles to rotate through
STYLES=(
    "baroque" "renaissance" "impressionism" "post-impressionism"
    "romanticism" "realism" "rococo" "neoclassicism"
    "expressionism" "surrealism" "cubism" "art nouveau"
    "mannerism" "pre-raphaelite" "symbolism" "fauvism"
    "gothic" "hudson river school" "pointillism" "tonalism"
)
